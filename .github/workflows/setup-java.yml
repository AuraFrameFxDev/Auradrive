name: Setup Java
on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '24'
      - name: Show Java version
        run: java -version
      - name: Show JAVA_HOME
        run: echo $JAVA_HOME
